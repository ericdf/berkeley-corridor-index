  - id: hope_center_berkeley_way
    label: "Hope Center (Berkeley Way)"
    address: "2012 Berkeley Way"
    lat: 37.8710
    lon: -122.2745
    opening_date: "2022-09-01"
    operator: "Insight Housing"
    program_type: "Emergency shelter / PSH / transitional"
