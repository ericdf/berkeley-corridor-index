# Incumbent overnight homeless services facilities in Berkeley.
# Used to benchmark study sites against peer institutions rather than
# arbitrary citywide grid points.
#
# opening_date: date facility began overnight residential operations at this address.
# monitor_only: true means include in data collection but exclude from
#   comparative results due to insufficient operating history.
# Coordinates are approximate — verify before publication.

incumbents:
  - id: usv
    label: "Ursula Sherman Village"
    address: "711 Harrison St"
    lat: 37.8671
    lon: -122.3028
    opening_date: "1971-01-01"   # long-established; placeholder day/month
    operator: "BOSS"
    program_type: "Emergency shelter / transitional"
    notes: "First shelter for homeless disabled adults in California. Beds for adults with disabilities and families."

  - id: stair
    label: "STAIR Navigation Center"
    address: "1601 Second St"
    lat: 37.8782
    lon: -122.2986
    opening_date: "2018-06-27"
    operator: "City of Berkeley"
    program_type: "Navigation center"
    notes: "Berkeley's first navigation center. 50 beds. Opened June 2018."

  - id: hope_center
    label: "Hope Center"
    address: "2012 Berkeley Way"
    lat: 37.8710
    lon: -122.2745
