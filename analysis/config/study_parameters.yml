# Core study parameters

pre_post_window_months: 12

# -------------------------------------------------------------------
# Primary treatment geographies
# Two distinct spatial clusters analyzed independently.
# Initial combined corridor incorporated low-activity intervening
# blocks; final analysis separates the University core from the
# San Pablo node.
# -------------------------------------------------------------------
university_core:
  label: "University Avenue core cluster"
  buffer_m: 250        # buffer around convex hull of the three University sites
  # Baseline for indexed comparisons: before first site opening in group.

san_pablo_node:
  label: "San Pablo node"
  buffer_m: 250        # buffer around 1620 San Pablo point

# Combined appendix geography (reference only — not the primary analysis)
combined_corridor:
  label: "All sites combined (appendix)"
  buffer_m: 250

# Immediate site zones (secondary / descriptive only)
immediate_zone_m: 100

# Legacy zone radii — retained for site-profile descriptive outputs
zones:
  site_block_m: 100
  adjacent_blocks_m: 300
  wider_nearby_m: 600

rolling_yoy_window_months: 3

# Call types treated as non-traffic
non_traffic_call_types:
  - disturbance
  - trespassing
  - suspicious person
  - suspicious vehicle
  - welfare check
  - mentally ill
  - "5150"
  - theft
  - robbery
  - assault
  - battery
  - vandalism
  - encampment
  - noise
  - fight
  - person down

# Control corridors
control_corridors:
  north_shattuck:
    label: "North Shattuck"
    center_lat: 37.8793
    center_lon: -122.2696
    radius_m: 500
  south_telegraph:
    label: "South Telegraph"
    center_lat: 37.8574
    center_lon: -122.2595
    radius_m: 500
